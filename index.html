<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GP Automate — Model Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-thumb{background:#94a3b8;border-radius:10px;}
  </style>
</head>
<body class="min-h-screen bg-slate-950 text-slate-100">
  <main class="mx-auto max-w-6xl px-6 py-10">
    <header class="flex flex-col gap-6 sm:flex-row sm:items-center sm:justify-between">
      <div class="flex items-center gap-4">
        <div class="h-12 w-12 overflow-hidden rounded-xl bg-slate-900 ring-1 ring-white/10">
          <img
            src="../gpa-flow-builder/src/assets/automate-logo-white.png"
            alt="GP Automate"
            class="h-full w-full object-contain"
            onerror="this.style.display='none'; this.parentElement.classList.add('flex','items-center','justify-center'); this.parentElement.innerHTML='<span class=\'text-slate-300 text-xs\'>GP</span>';"
          />
        </div>
        <div>
          <h1 class="text-xl font-semibold tracking-tight">GP Automate — Model Hub</h1>
          <p class="text-sm text-slate-300">Choose an option below to explore differnt models available for internal use.</p>
        </div>
      </div>

      <div class="text-sm text-slate-400"></div>
    </header>

    <section class="mt-10">
      <div class="grid grid-cols-1 gap-4 sm:grid-cols-2 lg:grid-cols-3">
        <a
          href="./financial-model.html"
          class="group rounded-2xl bg-white/5 p-5 ring-1 ring-white/10 transition hover:bg-white/10"
        >
          <div class="flex items-start justify-between gap-4">
            <div>
              <h2 class="text-base font-semibold text-white">Referral Programme — Financial Model</h2>
              <p class="mt-1 text-sm text-slate-300">Open the current financial model.</p>
            </div>
            <span class="rounded-full bg-emerald-400/10 px-2.5 py-1 text-xs font-medium text-emerald-200 ring-1 ring-emerald-400/20">Live</span>
          </div>
          <div class="mt-4 text-sm text-slate-400 group-hover:text-slate-300">Open →</div>
        </a>

        <!-- Add more cards here, e.g.
          <a href="./my-new-model.html" class="...">...</a>
        -->
      </div>
    </section>
  </main>
</body>
</html>
